name: guardian

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-guardian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guardian}
      POSTGRES_DB: ${POSTGRES_DB:-guardian}
    volumes:
      - guardian-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-guardian}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - guardian-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      ACCESS_TOKEN: ${ACCESS_TOKEN:-guardian-demo-2026}
      DATABASE_URL: "postgres://${POSTGRES_USER:-guardian}:${POSTGRES_PASSWORD:-guardian}@postgres:5432/${POSTGRES_DB:-guardian}?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      TRIAL_MINUTES: ${TRIAL_MINUTES:-5}
    expose:
      - "8080"

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      GUARDIAN_DOMAIN: ${GUARDIAN_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - guardian-caddy-data:/data
      - guardian-caddy-config:/config

volumes:
  guardian-pg:
  guardian-redis:
  guardian-caddy-data:
  guardian-caddy-config:
