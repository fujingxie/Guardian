name: Release and Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test Go & Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Test Agent
        run: |
          cd agent
          go test ./...

      - name: Test Backend
        run: |
          cd backend
          go test ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Frontend Deps and Build
        run: |
          cd web
          npm ci
          npm run build

  release-agent:
    name: Build & Release Agent
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build Agent (amd64)
        run: |
          cd agent
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ../guardian-agent-linux-amd64 ./cmd/agent

      - name: Build Agent (arm64)
        run: |
          cd agent
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o ../guardian-agent-linux-arm64 ./cmd/agent

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            guardian-agent-linux-amd64
            guardian-agent-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
